name: Build Dark Browser APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: unzip dark-browser-with-ci.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x dark-browser/gradlew

      - name: Create .env file
        run: |
          cd dark-browser
          cp .env.example .env

      - name: Build Debug APK
        run: |
          cd dark-browser
          ./gradlew assembleDebug --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dark-browser-apk
          path: dark-browser/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
